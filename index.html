<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ретро табло «Что? Где? Когда?» — Синее табло для игр</title>
    <meta name="description"
        content="Интерактивное синее табло счёта в стиле старых выпусков игры «Что? Где? Когда?» (до 2017 года)">
    <meta name="keywords"
        content="Что Где Когда, ЧГК, табло, счёт, таймер, синее табло, ретро табло, игра своими руками, табло для викторины">

    <meta property="og:title" content="Ретро табло «Что? Где? Когда?»">
    <meta property="og:description" content="Классическое синее табло для ведения счёта в стиле ЧГК.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://gdainti.com/chgk-scoreboard/scoreboard.png">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F95N2TK4CC"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-F95N2TK4CC');
    </script>
    <style>
        :root {
            --blue-color: #3c83e4;
            --white-color: #fffefe;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .scoreboard {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .score {
            font-size: 80vh;
            font-weight: bold;
            text-align: center;
            user-select: none;            
            line-height: 0;            
            margin-top: 0.15em; 
        }

        .panel.left { background-color: var(--white-color); }
        .panel.left .score { color: var(--blue-color); }

        .panel.right { background-color: var(--blue-color); }
        .panel.right .score { color: var(--white-color); }

        .corner-trigger {
            position: absolute;
            width: 100%;
            height: 50%;
            cursor: pointer;
            z-index: 10;
        }
        .top { top: 0; }
        .bottom { bottom: 0; }
    </style>
</head>
<body>
    <div class="scoreboard">
        <div class="panel left">
            <div id="left-score" class="score">0</div>
            <div id="top-left-trigger" class="corner-trigger top"></div>
            <div id="bottom-left-trigger" class="corner-trigger bottom"></div>
        </div>
        <div class="panel right">
            <div id="right-score" class="score">0</div>
            <div id="top-right-trigger" class="corner-trigger top"></div>
            <div id="bottom-right-trigger" class="corner-trigger bottom"></div>
        </div>
    </div>

    <script>
        const leftScoreElement = document.getElementById('left-score');
        const rightScoreElement = document.getElementById('right-score');

        let leftScore = 0;
        let rightScore = 0;

        function updateScores() {
            leftScoreElement.textContent = leftScore;
            rightScoreElement.textContent = rightScore;

            const len = Math.max(leftScore.toString().length, rightScore.toString().length);
            const baseSize = 80; // vh
            const newSize = len > 1 ? (baseSize / (len * 0.8)) : baseSize;
            
            leftScoreElement.style.fontSize = newSize + 'vh';
            rightScoreElement.style.fontSize = newSize + 'vh';
        }

        document.getElementById('top-left-trigger').onclick = () => { leftScore++; updateScores(); };
        document.getElementById('bottom-left-trigger').onclick = () => { leftScore = Math.max(0, leftScore - 1); updateScores(); };
        document.getElementById('top-right-trigger').onclick = () => { rightScore++; updateScores(); };
        document.getElementById('bottom-right-trigger').onclick = () => { rightScore = Math.max(0, rightScore - 1); updateScores(); };

        updateScores();
    </script>
</body>
</html>
